version: "3.9"

services:

  db:
    image: postgres:15
    container_name: currencies-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: currencies
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: currencies-backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/currencies
  frontend:
    build: ./frontend
    container_name: currencies-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
volumes:
  pgdata: